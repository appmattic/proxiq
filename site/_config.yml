title: Proxiq
description: "The AI gateway your security team will actually approve. DLP, policy enforcement, SSO, and full audit trail — self-hosted, open source."
baseurl: ""
url: "https://proxiq.io"

theme: just-the-docs

# Site logo
logo: "/assets/images/appmattic-mark.svg"

# Favicon — points at the SVG logo (supported by all modern browsers)
favicon_ico: "/assets/images/appmattic-mark.svg"

# Color scheme: "light" or "dark"
color_scheme: dark

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Aux links (top-right navigation)
aux_links:
  "GitHub":
    - "https://github.com/appmattic/proxiq"
  "APPMATTIC":
    - "https://appmattic.com"
aux_links_new_tab: true

# Heading anchors
heading_anchors: true

# Footer
footer_content: 'Built by <a href="https://appmattic.com">APPMATTIC</a>. Open source under <a href="https://github.com/appmattic/proxiq/blob/main/LICENSE">AGPL-3.0</a>.'

# Edit on GitHub link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/appmattic/proxiq"
gh_edit_branch: "main"
gh_edit_source: site
gh_edit_view_mode: "tree"

# Callout colours
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green

# Navigation
nav_enabled: true

# Suppress Dart Sass deprecation warnings from gem dependencies
# (just-the-docs 0.12.x uses @import, map-get, darken/lighten — all deprecated
# in Dart Sass 3.0.0 but not fixable without a gem upgrade)
sass:
  quiet_deps: true

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - .bundle
  - gems
  - bin
  - node_modules
  - vendor
