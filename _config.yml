title: proxiq
description: "LLM context optimization proxy. Reduce token costs 65–85% via semantic caching, context compression, and intelligent prompt cache placement."
baseurl: ""
url: "https://proxiq.io"

remote_theme: just-the-docs/just-the-docs

# Site logo
logo: "/assets/images/appmattic-mark.svg"

# Favicon
# favicon_ico: "/assets/images/favicon.ico"

# Color scheme: "light" or "dark"
color_scheme: dark

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# Aux links (top-right navigation)
aux_links:
  "GitHub":
    - "https://github.com/appmattic/proxiq"
  "APPMATTIC":
    - "https://appmattic.com"
aux_links_new_tab: true

# Heading anchors
heading_anchors: true

# Footer
footer_content: 'Built by <a href="https://appmattic.com">APPMATTIC</a>. Open source under <a href="https://github.com/appmattic/proxiq/blob/main/LICENSE">GPL 3.0</a>.'

# Edit on GitHub link
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/appmattic/proxiq"
gh_edit_branch: "main"
gh_edit_source: site
gh_edit_view_mode: "tree"

# Callout colours
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green

# Navigation
nav_enabled: true

# Plugins (GitHub Pages safe)
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - .bundle
  - gems
  - bin
  - node_modules
  - vendor
